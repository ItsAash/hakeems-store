query SpotlightCollection($slug: String!, $take: Int!) {
  collection(slug: $slug) {
    id
    name
    slug
    productVariants(options: { take: $take }) {
      items {
        id
        priceWithTax
        currencyCode
        stockLevel
        featuredAsset {
          preview
        }
        assets {
          preview
        }
        product {
          id
          slug
          name
          featuredAsset {
            preview
          }
          customFields {
            discountPercent
            promoLabel
            badge
          }
        }
        options {
          id
          code
          name
          groupId
          group {
            code
          }
          customFields {
            swatch
          }
        }
      }
    }
  }
}
