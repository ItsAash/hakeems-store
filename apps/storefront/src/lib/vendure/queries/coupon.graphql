mutation ApplyCouponCode($couponCode: String!) {
  applyCouponCode(couponCode: $couponCode) {
    __typename
    ... on Order {
      ...ActiveOrderFields
    }
    ... on ErrorResult {
      errorCode
      message
    }
  }
}

mutation RemoveCouponCode($couponCode: String!) {
  removeCouponCode(couponCode: $couponCode) {
    __typename
    ... on Order {
      ...ActiveOrderFields
    }
  }
}
