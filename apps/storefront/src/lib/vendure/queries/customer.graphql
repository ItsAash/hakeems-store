fragment CustomerAddressFields on Address {
  id
  fullName
  company
  streetLine1
  streetLine2
  city
  province
  postalCode
  phoneNumber
  defaultShippingAddress
  defaultBillingAddress
  country {
    code
    name
  }
}

query ActiveCustomer {
  activeCustomer {
    id
    firstName
    lastName
    emailAddress
    phoneNumber
    addresses {
      ...CustomerAddressFields
    }
  }
}

query CustomerOrders($take: Int!, $skip: Int!) {
  activeCustomer {
    id
    orders(options: { take: $take, skip: $skip, sort: { orderPlacedAt: DESC } }) {
      totalItems
      items {
        id
        code
        state
        orderPlacedAt
        totalWithTax
        currencyCode
        totalQuantity
      }
    }
  }
}

mutation UpdateCustomer($input: UpdateCustomerInput!) {
  updateCustomer(input: $input) {
    id
    firstName
    lastName
    phoneNumber
  }
}

mutation UpdateCustomerPassword($currentPassword: String!, $newPassword: String!) {
  updateCustomerPassword(currentPassword: $currentPassword, newPassword: $newPassword) {
    __typename
    ... on Success {
      success
    }
    ... on ErrorResult {
      errorCode
      message
    }
  }
}

mutation RequestUpdateCustomerEmailAddress($password: String!, $newEmailAddress: String!) {
  requestUpdateCustomerEmailAddress(password: $password, newEmailAddress: $newEmailAddress) {
    __typename
    ... on Success {
      success
    }
    ... on ErrorResult {
      errorCode
      message
    }
  }
}

mutation UpdateCustomerEmailAddress($token: String!) {
  updateCustomerEmailAddress(token: $token) {
    __typename
    ... on Success {
      success
    }
    ... on ErrorResult {
      errorCode
      message
    }
  }
}

mutation CreateCustomerAddress($input: CreateAddressInput!) {
  createCustomerAddress(input: $input) {
    ...CustomerAddressFields
  }
}

mutation UpdateCustomerAddress($input: UpdateAddressInput!) {
  updateCustomerAddress(input: $input) {
    ...CustomerAddressFields
  }
}

mutation DeleteCustomerAddress($id: ID!) {
  deleteCustomerAddress(id: $id) {
    success
  }
}
