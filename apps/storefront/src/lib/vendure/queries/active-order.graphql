fragment ActiveOrderFields on Order {
  id
  code
  state
  totalQuantity
  subTotalWithTax
  shippingWithTax
  totalWithTax
  currencyCode
  lines {
    id
    quantity
    unitPriceWithTax
    linePriceWithTax
    featuredAsset {
      preview
    }
    productVariant {
      id
      name
      sku
      product {
        slug
      }
      options {
        code
        name
        group {
          code
        }
      }
    }
  }
  shippingLines {
    priceWithTax
    shippingMethod {
      name
    }
  }
  shippingAddress {
    fullName
    streetLine1
    streetLine2
    city
    province
    postalCode
    countryCode
    phoneNumber
    customFields {
      shippingZoneId
    }
  }
  customer {
    id
    emailAddress
  }
}

query ActiveOrderSummary {
  activeOrder {
    id
    code
    totalQuantity
    totalWithTax
    currencyCode
  }
}

query ActiveOrderFull {
  activeOrder {
    ...ActiveOrderFields
  }
}
